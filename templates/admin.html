<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Sasa Lino</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Poppins', sans-serif; }
        .admin-header { background: white; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .logo-admin { max-width: 180px; height: auto; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-primary { background-color: #d63384; border: none; }
        .btn-primary:hover { background-color: #b82a6f; }
        .product-img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="admin-header">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Sasa Lino" class="logo-admin">
        <h5 class="mt-2 text-muted">Painel de Controle</h5>
    </div>

    <div class="container mt-2" style="max-width: 600px;">
        {% if sucesso %}
            <div class="alert alert-success text-center">{{ sucesso }}</div>
        {% endif %}

        <div class="card p-4 mb-4">
            <h4 class="mb-4 text-center">Novo Produto</h4>
            <form method="POST" enctype="multipart/form-data">
                <input type="hidden" name="senha_acesso" value="{{ senha_valida }}">
                <div class="mb-3">
                    <label class="form-label">Nome do Peça</label>
                    <input type="text" name="nome" class="form-control" placeholder="Ex: Vestido Longo" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Preço (R$)</label>
                    <input type="text" name="preco" class="form-control" placeholder="Ex: 120,00" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Foto do Produto</label>
                    <input type="file" name="foto" class="form-control" accept="image/*" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Postar no Site</button>
            </form>
        </div>

        <div class="card p-4 mb-4">
            <h5 class="mb-3">Gerenciar Postagens</h5>
            <div class="list-group">
                {% for p in produtos %}
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <img src="{{ url_for('static', filename='uploads/' + p.img) }}" class="product-img-preview">
                        <span class="ms-3">{{ p.nome }} - R$ {{ p.preco }}</span>
                    </div>
                    <form method="POST">
                        <input type="hidden" name="senha_acesso" value="{{ senha_valida }}">
                        <input type="hidden" name="apagar_idx" value="{{ loop.index0 }}">
                        <button type="submit" class="btn btn-outline-danger btn-sm">Apagar</button>
                    </form>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="card p-4 text-center" style="background-color: #fff0f5;">
            <form method="POST">
                <input type="hidden" name="senha_acesso" value="{{ senha_valida }}">
                <input type="text" name="nova_senha" class="form-control form-control-sm mb-2" placeholder="Nova Senha">
                <button type="submit" class="btn btn-outline-secondary btn-sm w-100">Alterar Minha Senha</button>
            </form>
            <hr>
            <a href="/" class="btn btn-link text-muted btn-sm">Ver Vitrine do Site</a>
        </div>
    </div>

</body>
</html>
